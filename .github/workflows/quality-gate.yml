name: FinRAG Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=finrag \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v --tb=short
        env:
          FINRAG_INIT_PIPELINE: "false"

  eval-gate:
    name: Evaluation Quality Gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run RAGAS evaluation
        run: |
          python -m finrag.evaluation.run_eval \
            --mode ragas \
            --threshold 0.85 \
            --output ragas_report.json
        env:
          FINRAG_INIT_PIPELINE: "false"

      - name: Run LLM-as-Judge evaluation
        run: |
          python -m finrag.evaluation.run_eval \
            --mode judge \
            --threshold 0.90 \
            --output judge_report.json
        env:
          FINRAG_INIT_PIPELINE: "false"

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: |
            ragas_report.json
            judge_report.json

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py \
            -v --tb=short
        env:
          FINRAG_INIT_PIPELINE: "false"
